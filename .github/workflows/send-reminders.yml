name: Send Reminders

on:
  schedule:
    - cron: "* * * * *"  # runs every minute
  workflow_dispatch:       # allows manual triggering

jobs:
  send_reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Hit send-reminders endpoint securely
        run: |
          curl -X GET "https://uchida-zoom-zone.vercel.app/api/send-reminders?secret=${{ secrets.CRON_SECRET }}"
